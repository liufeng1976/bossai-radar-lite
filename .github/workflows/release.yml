name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release packages
        run: npm run package:release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="docs/RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ ! -f "$NOTES" ]; then
            NOTES="CHANGELOG.md"
          fi
          gh release create "$GITHUB_REF_NAME" release/* \
            --title "BossAI Radar Lite $GITHUB_REF_NAME" \
            --notes-file "$NOTES"
